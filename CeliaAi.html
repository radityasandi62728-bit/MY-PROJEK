<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Celia AI</title>
</head>
<script type="module" src="mainWeb.js"></script>
<body>
    <link rel="stylesheet" href="CeliaAi.css">
    <div class="app">
        <main class="main-app">
            <section class="chat-log">
                <div class="messages">
                </div>
            </section>
            <aside class="Celia-panel">
                <div class="ava">
                    <img src="asset/chara_stand_1091_109102.png" alt="Celia Avatar">
                </div>
                <div class="Ai-Status">
                     <p>Mood: Netral</p>
                     <p>Score: 0</p>
                </div>
            </aside>
            <footer class="input-area">
                <form class="input-form">
                    <input type="text" class="input-field" placeholder="Type your message here...">
                    <button type="submit" class="send-button">Send</button>
                </form>
            </footer>
        </main>

    </div>
</body>
</html>
